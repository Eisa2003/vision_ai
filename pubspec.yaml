name: object_detection_app
description: Object detection and distance estimation using ML Kit.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Camera access
  camera: ^0.11.0+2

  # ML Kit object detection
  google_mlkit_object_detection: ^0.13.0
  google_mlkit_commons: 0.8.1

  # TensorFlow Lite for object detection and distance estimation
  tflite_flutter: ^0.12.1
  image: ^4.1.7 
 
  # Image picker (gallery)
  image_picker: 0.8.9

  # State management (light usage)
  flutter_riverpod: ^2.5.1

  # UI helpers
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/yolov8n_float32.tflite
    - assets/models/coco_labels.txt
    - assets/models/midas_v21_small.tflite
